# Include inside the existing songuu.com server block.
# Keep host Nginx as the public router; PM2 owns the Node app on loopback.
location = /agent-demo/spiffe {
  return 301 /agent-demo/spiffe/;
}

location /agent-demo/spiffe/ {
  proxy_pass http://127.0.0.1:5173/agent-demo/spiffe/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}